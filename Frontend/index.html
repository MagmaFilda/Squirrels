<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrels Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" type="image/png" href="images/nutty.png">
</head>
<body>
    <audio id="bgMusic" src="sounds/perfectly loop.wav" loop></audio>

    <header class="navbar">
        <a href="html/login.html" class="nav-btn" id="loginBtn">
            <img src="images/logintext.png" alt="Login">
        </a>
        <a href="html/index.html" class="nav-btn" id="logoutBtn">
            <img src="images/logouttext.png" alt="Logout">
        </a>
        <a href="html/about.html" class="nav-btn">
            <img src="images/abouttext.png" alt="About">
        </a>
    </header>

    <div class="volume-container">
        <span class="volume-icon">MUSIC</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
    </div>

    <main class="main-content">
        <div class="main-logo">
            <img src="images/logo.png" alt="Squirrels Logo">
        </div>
        <button id="open-leaderboard-btn" class="lea-btn">LEADERBOARD</button>

        <div id="leaderboard-overlay" class="leaderboard-overlay">
            <div class="leaderboard-content">
                <button id="close-leaderboard-btn" class="close-btn">X</button>
                <h2 class="leaderboard-title">TOP COLLECTORS</h2>
                
                <div class="leaderboard-table-container">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>RANK</th>
                                <th>PLAYER</th>
                                <th>LEGENDARY</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-data">
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
    <a href="html/invertory.html" class="foot-btn">
        <img src="images/invtext.png" alt="Inventory">
    </a>
    <a href="html/catalog.html" class="foot-btn">
        <img src="images/catalogtext.png" alt="Catalog">
    </a>
    <a href="html/shop.html" class="foot-btn">
        <img src="images/shoptext.png" alt="Shop">
    </a>
    
</footer>

<script src="js/auth.js"></script> 
<script src="js/index.js"></script>
</body>
</html>
