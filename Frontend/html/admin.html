<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
</head>
<body>
    <div class="page">
        <aside class="navbar navbar-vertical navbar-expand-lg">
            <div class="container-fluid">
                <h1 class="navbar-brand">
                    Squirrels Admin
                </h1>

                <div class="navbar-nav">
                    <a class="nav-link" href="admin.html">Dashboard</a>
                    <a class="nav-link" href="../index.html">Back to game</a>
                    <a class="nav-link" href="add-squirrel.html">ADD Squirrel</a>
                </div>
            </div>
        </aside>

        <div class="page-wrapper">
            <div class="page-header">
                <div class="container-xl">
                    <h2 class="page-title">Dashboard</h2>
                </div>
            </div>

            <div class="page-body">
                <div class="container-xl">
                    <div class="row row-cards">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-body">
                                    <h3>Registered Users</h3>
                                    <div class="table-responsive">
                                        <table class="table table-vcenter">
                                            <thead>
                                                <tr>
                                                    <th>USERNAME</th>
                                                    <th>NUTS</th>
                                                    <th>SQUIRRELS</th>
                                                </tr>
                                            </thead>
                                            <tbody id="users-table-body">
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-body">
                                    <h3>All Squirrels</h3>
                                    <div class="table-responsive">
                                        <table class="table table-vcenter">
                                            <thead>
                                                <tr>
                                                    <th>ID</th>
                                                    <th>NAME</th>
                                                    <th>PRICE</th>
                                                    <th>RARITY</th>
                                                </tr>
                                            </thead>
                                            <tbody id="squirrels-table-body">
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal modal-blur fade" id="squirrelsModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Veverky uživatele: <span id="modal-username" class="text-primary"></span></h5>
                </div>
                <div class="modal-body">
                    <ul class="list-group list-group-flush" id="modal-squirrels-list">
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zavřít</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editMoneyModal" tabindex="-1" aria-labelledby="editMoneyModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-sm"> <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editMoneyModalLabel">Upravit peníze</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body d-flex align-items-center gap-2">
                <input type="number" id="edit-money-input" class="form-control" value="0">
                <button id="save-money-btn" class="btn btn-success p-2 d-flex align-items-center justify-content-center" title="Uložit">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-check m-0" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M5 12l5 5l10 -10"></path>
                    </svg>
                </button>
            </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>

</body>
</html>
