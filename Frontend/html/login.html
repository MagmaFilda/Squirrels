

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrels Game - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./../styles/login.css">
    <link rel="icon" type="image/png" href="./../images/gamer.png">

</head>
<body>

    <header class="login-header">
        <a href="./../html/index.html" class="mini-logo">
            <img src="./../images/logo.png" alt="Squirrels Mini Logo">
        </a>

        <a href="./../html/index.html" class="nav-btn">
            <img src="./../images/backtext.png" alt="Back">
        </a>
    </header>

    <main class="login-container">
        <div class="login-board">
            
            <div class="pixel-decor bubbles-left" ><img src="./../images/nutty.png" alt="Squirrels Mini Logo"></div>
            <div class="pixel-decor bubbles-right"></div>
            <div class="pixel-decor acorn-left"></div>
            <div class="pixel-decor acorn-right"><img src="./../images/gamer.png" alt="Squirrels Mini Logo"></div>

            <div class="scroll-paper">
                <h1 class="login-title">LOG IN</h1>

                <form class="login-form">
                    <div class="input-group">
                        <label for="username">USERNAME</label>
                        <div class="input-field">
                            <div class="input-icon icon-user">👤</div>
                            <input type="text" id="username" placeholder="Enter Username" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">PASSWORD</label>
                        <div class="input-field">
                            <div class="input-icon icon-password">🔒</div>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="remember-row">
                        <label class="pixel-checkbox-label">
                            <input type="checkbox" id="remember-me">
                            <span class="pixel-checkbox"></span>
                            REMEMBER ME
                        </label>
                    </div>
                

                    <button type="submit" class="login-submit-btn">LOGIN</button>
                </form>
                <div class="login-footer-links">
                    <a href="./../html/register.html" class="signup-link">Don't have an account? <span>REGISTER</span></a>
                </div>

                
            </div>

        </div>
    </main>

</body>
</html>
