    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <title>Squirrels Game - Shop</title>
    <link rel="icon" type="image/png" href="./../images/kingmidas.png">
    <link rel="stylesheet" href="./../styles/shop.css">
</head>
<body>
    
    <audio id="bgMusic" src="./../sounds/music menu.wav" loop></audio>


    <header class="shop-header">
        <a href="./../html/index.html" class="mini-logo">
            <img src="./../images/shop.png" alt="Squirrels Mini Logo">
        </a>

        <div class="page-title">
            <img src="./../images/shoptext.png" alt="Shop">
        </div>

        <a href="./../html/index.html" class="nav-btn">
            <img src="./../images/backtext.png" alt="Back">
        </a>
        
    </header>
    <div class="volume-container">
        <span class="volume-icon">MUSIC</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
    </div>
    

    <main class="shop-container">
        <div class="shop-window">
            
            <div class="player-currency">
                <span class="currency-label">PLAYER NUTS:</span>
                <div class="currency-value">🌰 <span id="nut-count">742</span></div>
            </div>

            <h2 class="exchange-title">THE SQUIRREL'S EXCHANGE</h2>

            <div class="cones-grid">
                
                <div class="cone-card frame-common" id="card-1">
                    <h3>FOREST FIND</h3>
                    <span class="rarity common">BASIC</span>
                    <div class="cone-display">
                        <img src="./../images/basic-pi.png" alt="Common Cone" class="cone-img">
                    </div>
                    <div class="price-tag">🌰 100 </div>
                    <button class="buy-btn" onclick="startHatching(1, 100)">BUY</button>
                </div>

                <div class="cone-card frame-uncommon" id="card-2">
                    <h3>RIVER JEWEL</h3>
                    <span class="rarity uncommon">SILVER</span>
                    <div class="cone-display">
                        <img src="./../images/silver-pi.png" alt="Uncommon Cone" class="cone-img">
                    </div>
                    <div class="price-tag">🌰 200 </div>
                    <button class="buy-btn" onclick="startHatching(2, 200)">BUY</button>
                </div>

                <div class="cone-card frame-rare" id="card-3">
                    <h3>SUN GLOW</h3>
                    <span class="rarity rare">GOLD</span>
                    <div class="cone-display">
                        <img src="./../images/golden-pi.png" alt="Rare Cone" class="cone-img">
                    </div>
                    <div class="price-tag">🌰 500</div>
                    <button class="buy-btn" onclick="startHatching(3, 500)">BUY</button>
                </div>

            </div>
        </div>
    </main>

    <div id="hatch-modal" class="hatch-overlay">
        <div class="hatch-content">
            <h2 id="hatch-status-text">CLICK TO HATCH!</h2>
            <p id="hatch-clicks-left">CLICKS: 4</p>
            
            <div class="hatch-stage">
                <img id="hatching-item" src="" alt="Líhnutí" onclick="registerHatchClick()">
            </div>

            <button id="modal-close-btn" class="modal-done-btn" onclick="closeHatchModal()" style="display: none;">GREAT!</button>
        </div>
    </div>

    <script>
        let currentClicks = 0;
        let currentConeId = 0;
        let playerNuts = 742;

        // --- NOVÉ: Načtení různých zvuků pro každou fázi praskání ---
        // Indexy 3, 2, 1 odpovídají počtu zbývajících kliknutí do vylíhnutí
        const crackSounds = {
            3: new Audio("./../sounds/pip.mp3"),  // První jemné křupnutí (při změně ze 4 na 3)
            2: new Audio("./../sounds/pep.mp3"), // Silnější křupnutí (při změně ze 3 na 2)
            1: new Audio("./../sounds/pop.mp3")   // Pořádná rána těsně před prasknutím (při změně ze 2 na 1)
        };
        // Zvuk pro finální vylíhnutí veverky (při změně z 1 na 0)
        const hatchSound = new Audio("./../sounds/open.mp3"); 

        const hatchingStages = {
            1: { 
                4: "./../images/basic-pi-0.png",        
                3: "./../images/basic-pi-1.png", 
                2: "./../images/basic-pi-2.png",
                1: "./../images/basic-pi-3.png", 
                0: "./../images/nutty.png"      
            },
            2: { 
                4: "./../images/silver-pi-0.png",
                3: "./../images/silver-pi-1.png",
                2: "./../images/silver-pi-2.png",
                1: "./../images/silver-pi-3.png",
                0: "./../images/rogue.png"
            },
            3: { 
                4: "./../images/golden-pi-0.png",
                3: "./../images/golden-pi-1.png",
                2: "./../images/golden-pi-2.png",
                1: "./../images/golden-pi-3.png",
                0: "./../images/angel.png"
            }
        };

        const hatchModal = document.getElementById('hatch-modal');
        const hatchingItem = document.getElementById('hatching-item');
        const hatchStatusText = document.getElementById('hatch-status-text');
        const hatchClicksLeft = document.getElementById('hatch-clicks-left');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const nutCountDisplay = document.getElementById('nut-count');

        function startHatching(coneId, price) {
            if (playerNuts < price) {
                alert("NOT ENOUGH NUTS! 🌰");
                return;
            }

            playerNuts -= price;
            nutCountDisplay.innerText = playerNuts;

            currentConeId = coneId;
            currentClicks = 4; 
            
            hatchingItem.src = hatchingStages[currentConeId][currentClicks];
            hatchingItem.className = ""; 

            hatchStatusText.innerText = "CLICK TO HATCH!";
            hatchClicksLeft.style.display = "block";
            hatchClicksLeft.innerText = `CLICKS: ${currentClicks}`;
            modalCloseBtn.style.display = "none";

            hatchModal.classList.add('active');
        }

        function registerHatchClick() {
            if (currentClicks > 0) {
                currentClicks--;
                
                hatchingItem.classList.remove('shake-animation');
                void hatchingItem.offsetWidth; 
                hatchingItem.classList.add('shake-animation');

                if (currentClicks > 0) {
                    hatchingItem.src = hatchingStages[currentConeId][currentClicks];
                    hatchClicksLeft.innerText = `CLICKS: ${currentClicks}`;
                    
                    // --- NOVÉ: Výběr a přehrání zvuku podle aktuální fáze ---
                    let aktualniZvuk = crackSounds[currentClicks];
                    if (aktualniZvuk) {
                        aktualniZvuk.currentTime = 0; // Umožní rychlé klikání za sebou
                        aktualniZvuk.play();
                    }
                    
                } else {
                    revealSquirrel();
                }
            }
        }

        function revealSquirrel() {
            // --- NOVÉ: Přehrání zvuku vylíhnutí veverky ---
            hatchSound.currentTime = 0;
            hatchSound.play();

            hatchClicksLeft.style.display = "none";
            hatchStatusText.innerText = "YOU GOT A SQUIRREL!";
            
            hatchingItem.src = hatchingStages[currentConeId][0];
            hatchingItem.className = "squirrel-revealed-animation";

            modalCloseBtn.style.display = "inline-block";
        }

        function closeHatchModal() {
            hatchModal.classList.remove('active');
        }

        document.addEventListener("DOMContentLoaded", function () {
    const bgMusic = document.getElementById("bgMusic");
    const volumeSlider = document.getElementById("volumeSlider");

    if (bgMusic && volumeSlider) {
        
        bgMusic.volume = volumeSlider.value;

        volumeSlider.addEventListener("input", function () {
            bgMusic.volume = volumeSlider.value;
        });

        function spustitHudbuPoKliknuti() {
            bgMusic.play().then(() => {
                document.removeEventListener("click", spustitHudbuPoKliknuti);
            }).catch(error => {
                console.log("Prohlížeč ještě blokuje audio, čekám na kliknutí.");
            });
        }

        document.addEventListener("click", spustitHudbuPoKliknuti);
    }
    });
    </script>
</body>
</html>
