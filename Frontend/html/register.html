

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrels Game - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./../styles/register.css">
    <link rel="icon" type="image/png" href="./../images/rogue.png">
</head>
<body>
        <audio id="bgMusic" src="../sounds/music menu.wav" loop></audio>

    <header class="register-header">
        <a href="../index.html" class="mini-logo">
            <img src="../images/logo.png" alt="Squirrels Mini Logo">
        </a>

        <a href="../index.html" class="nav-btn">
            <img src="../images/backtext.png" alt="Back">
        </a>
    </header>

    <main class="register-container">
        <div class="register-board">
            
            <div class="pixel-decor bubbles-left" ><img src="../images/bubbles.png" alt="Squirrels Mini Logo"></div>
            <div class="pixel-decor bubbles-right"></div>
            <div class="pixel-decor acorn-left"></div>
            <div class="pixel-decor acorn-right"><img src="../images/knight.png" alt="Squirrels Mini Logo"></div>

            <div class="scroll-paper">
                <h1 class="register-title">REGISTER</h1>

                <form class="register-form" id="registerForm">
                    <div class="input-group">
                        <label for="username">USERNAME</label>
                        <div class="input-field">
                            <div class="input-icon icon-user">👤</div>
                            <input type="text" id="username" placeholder="Enter Username" required>
                        </div>
                        <label for="email">EMAIL</label>
                        <div class="input-field">
                            <div class="input-icon icon-email">📫</div>
                            <input type="email" id="email" placeholder="Enter Email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">PASSWORD</label>
                        <div class="input-field">
                            <div class="input-icon icon-password">🔒</div>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        <label for="password">AGAIN PASSWORD</label>
                        <div class="input-field">
                            <div class="input-icon icon-password">🔒</div>
                            <input type="password" id="password-again" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="register-submit-btn" id="RegisterButton">REGISTER</button>

                    <p id="message"></p>
                </form>
                <div class="register-footer-links">
                    <a href="./../html/login.html" class="signup-link">Already have an account? <span>LOGIN</span></a>
                </div>

                
            </div>

        </div>
    </main>
    <div id="custom-alert" class="alert-hidden">
    <div class="alert-content">
        <p id="alert-message"></p>
    </div>
<script src="../js/auth.js"></script>
<script src="../js/register.js"></script>

</body>
</html>
