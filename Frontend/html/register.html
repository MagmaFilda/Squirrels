<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrels Game - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./../styles/register.css">
</head>
<body>

    <header class="login-header">
        <a href="./../html/index.html" class="mini-logo">
            <img src="./../images/logo.png" alt="Squirrels Mini Logo">
        </a>

        <a href="./../html/index.html" class="nav-btn">
            <img src="./../images/backtext.png" alt="Back">
        </a>
    </header>

    <main class="login-container">
        <div class="login-board">
            
            <div class="pixel-decor bubbles-left" ><img src="./../images/bubbles.png" alt="Squirrels Mini Logo"></div>
            <div class="pixel-decor bubbles-right"></div>
            <div class="pixel-decor acorn-left"></div>
            <div class="pixel-decor acorn-right"><img src="./../images/knight.png" alt="Squirrels Mini Logo"></div>

            <div class="scroll-paper">
                <h1 class="login-title">REGISTER</h1>

                <form class="login-form">
                    <div class="input-group">
                        <label for="username">USERNAME</label>
                        <div class="input-field">
                            <div class="input-icon icon-user">👤</div>
                            <input type="text" id="username" placeholder="Enter Username" required>
                        </div>
                        <label for="email">EMAIL</label>
                        <div class="input-field">
                            <div class="input-icon icon-email">📫</div>
                            <input type="email" id="email" placeholder="Enter Email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">PASSWORD</label>
                        <div class="input-field">
                            <div class="input-icon icon-password">🔒</div>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                   
                

                    <button type="submit" class="login-submit-btn">REGISTER</button>
                </form>
                <div class="login-footer-links">
                    <a href="./../html/login.html" class="signup-link">Already have an account? <span>LOGIN</span></a>
                </div>

                
            </div>

        </div>
    </main>

</body>
</html>
