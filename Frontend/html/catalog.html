<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <title>Squirrels Game - Catalog</title>
    <link rel="icon" type="image/png" href="../images/bubbles.png">
    <link rel="stylesheet" href="../styles/catalog.css">
</head>
<body>
    <audio id="bgMusic" src="../sounds/music menu.wav" loop></audio>

    <header class="catalog-header">
        <a href="../index.html" class="mini-logo">
            <img src="../images/logo.png" alt="Squirrels Mini Logo">
        </a>

        <div class="page-title">
            <img src="../images/catalogtext.png" alt="Catalog">
        </div>

        <a href="../index.html" class="nav-btn">
            <img src="../images/backtext.png" alt="Back">
        </a>
    </header>

    <main class="catalog-container">
        <div class="catalog-grid" id="catalog-grid"></div>
    </main>

    <div id="info-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <img id="modal-img" src="" alt="Squirrel">
                <h2 id="modal-title">Name</h2>
                <p id="modal-desc">Description</p>
                <div class="stats-container">
                    <div class="stat-row">
                        <span class="stat-label">STRENGTH</span>
                        <div class="pixel-bar">
                            <div id="bar-str" class="pixel-bar-fill str-color"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">SPEED</span>
                        <div class="pixel-bar">
                            <div id="bar-spd" class="pixel-bar-fill spd-color"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">DURABILITY</span>
                        <div class="pixel-bar">
                            <div id="bar-dur" class="pixel-bar-fill dur-color"></div>
                        </div>
                    </div>
                </div>
                <div class="sell-container">
                    <span class="sell-text">PRICE <strong id="modal-price">0</strong> 🌰</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/catalog.js"></script>
</body>
</html>
