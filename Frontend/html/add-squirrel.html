<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
</head>
<body>
    <div class="page">
        <aside class="navbar navbar-vertical navbar-expand-lg">
            <div class="container-fluid">
                <h1 class="navbar-brand">
                    Squirrels Admin
                </h1>

                <div class="navbar-nav">
                    <a class="nav-link" href="admin.html">Dashboard</a>
                    <a class="nav-link" href="../index.html">Back to game</a>
                    <a class="nav-link" href="add-squirrel.html">ADD Squirrel</a>
                </div>
            </div>
        </aside>

        <div class="page-wrapper">
            <div class="page-header">
                <div class="container-xl">
                    <h2 class="page-title">ADD SQUIRREL</h2>
                </div>
            </div>

            <div class="page-body">
                <div class="container-xl">
                    <div class="row row-cards">
                        <div class="col-md-12">
                            <div class="card">
                                <div class="card-body">
                                    <form id="addSquirrelForm">
                                        <div class="mb-3">
                                            <label class="form-label">Squirrel name</label>
                                            <input type="text" class="form-control" id="squirrelName" placeholder="king_midas" required>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">Description</label>
                                            <textarea class="form-control" id="squirrelDescription" rows="3" placeholder="Description of squirrel..." required></textarea>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">Price</label>
                                            <input type="number" class="form-control" id="squirrelCost" placeholder="300" required>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">Rarity</label>
                                            <select class="form-select" id="squirrelRarity" required>
                                                <option value="0">Common</option>
                                                <option value="1">Rare</option>
                                                <option value="2">Epic</option>
                                                <option value="3">Legendary</option>
                                            </select>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Strength</label>
                                                <input type="number" class="form-control" id="squirrelStrength" min="0" max="100" required>
                                            </div>

                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Speed</label>
                                                <input type="number" class="form-control" id="squirrelSpeed" min="0" max="100" required>
                                            </div>

                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Durability</label>
                                                <input type="number" class="form-control" id="squirrelDurability" min="0" max="100" required>
                                            </div>
                                        </div>

                                        <button type="submit" class="btn btn-primary" id="addSquirrelButton">
                                            Add Squirrel
                                        </button>

                                        <p id="addSquirrelMessage" class="mt-3"></p>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>

    <script src="../js/auth.js"></script>
    <script src="../js/addSquirrel.js"></script>

</body>
</html>
